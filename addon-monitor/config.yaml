name: Addon Monitor
version: 1.0.0
slug: addon_monitor
description: Monitors other add-ons for CPU and memory usage.
arch:
  - armv7
  - aarch64
  - amd64
startup: services
boot: auto
options:
  slug: core_mosquitto
  cpu_threshold: 80
  memory_threshold: 80
  interval: 60
  cpu_failures: 3
  memory_failures: 3
  auto_restart: true
schema:
  slug: str
  cpu_threshold: int(0,100)
  memory_threshold: int(0,100)
  interval: int(1,3600)
  cpu_failures: int(1,10)
  memory_failures: int(1,10)
  auto_restart: bool
udev: true
full_access: true
homeassistant: 2025.4.0
backup: hot
auth_api: true
homeassistant_api: true
docker_api: true
devices:
  - /var/run/docker.sock:/var/run/docker.sock:rw
environment:
  - ADDON_SLUG
  - CPU_THRESHOLD
  - MEMORY_THRESHOLD
  - INTERVAL
  - CPU_FAILURES
  - MEMORY_FAILURES
  - AUTO_RESTART